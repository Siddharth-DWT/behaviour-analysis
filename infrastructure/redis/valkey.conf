# ============================================================================
# Valkey (Redis-compatible) Configuration for NEXUS
# Optimized for Streams-based inter-agent messaging
# ============================================================================

# Network
bind 0.0.0.0
port 6379
protected-mode no
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (RDB snapshots - lightweight for dev)
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Append-Only File (disabled for dev - enable for production)
appendonly no

# Streams configuration
# Max memory for stream entries before trimming
# In production, trim old signal entries to control memory
stream-node-max-bytes 4096
stream-node-max-entries 100

# Logging
loglevel notice
