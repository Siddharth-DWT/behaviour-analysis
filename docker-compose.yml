# ============================================================================
# NEXUS - Multi-Agent Behavioural Analysis System
# Docker Compose - Monolithic Backend (Phase 4 cutover)
# ============================================================================
#
# USAGE:
#   docker compose up -d          → Start all services
#   docker compose logs -f        → Watch logs
#   docker compose down           → Stop all
#   docker compose down -v        → Stop + delete data
#
# SERVICES:
#   postgres      → PostgreSQL 16 + pgvector
#   redis         → Valkey 8 (session state + signals, db1)
#   neo4j         → Neo4j 5 (knowledge graph — fresh instance for monolith)
#   backend       → NEXUS monolithic backend (replaces 6 separate agents)
#   dashboard     → React Admin Dashboard
#
# PORTS (host → container):
#   5437  → PostgreSQL (5432)      ← new; old nexus-postgres uses 5436
#   6382  → Redis/Valkey (6379)    ← new; old nexus-redis uses 6381
#   7475  → Neo4j Browser (7474)   ← new; old nexus-neo4j uses 7474
#   7688  → Neo4j Bolt (7687)      ← new; old nexus-neo4j uses 7687
#   8000  → Backend API (8000)
#   3006  → Dashboard (3000)
#
# ALL volumes use the ba_ prefix so old nexus-* volumes are never touched.
# Running "docker compose up" here will NOT affect any nexus-* container.
#
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # INFRASTRUCTURE
  # --------------------------------------------------------------------------

  postgres:
    image: pgvector/pgvector:pg16
    container_name: behaviour-analysis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_dev_2026}
    ports:
      - "${POSTGRES_PORT:-5437}:5432"
    volumes:
      - ba_postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - behaviour-analysis-network

  redis:
    image: valkey/valkey:8-alpine
    container_name: behaviour-analysis-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6382}:6379"
    volumes:
      - ba_redis_data:/data
      - ./infrastructure/redis/valkey.conf:/etc/valkey/valkey.conf
    command: valkey-server /etc/valkey/valkey.conf
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - behaviour-analysis-network

  neo4j:
    image: neo4j:5.26-community
    container_name: behaviour-analysis-neo4j
    restart: unless-stopped
    ports:
      - "7475:7474"   # Browser UI  (old nexus-neo4j uses 7474)
      - "7688:7687"   # Bolt protocol (old nexus-neo4j uses 7687)
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-nexus_graph_2026}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512m
    volumes:
      - ba_neo4j_data:/data
      - ba_neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - behaviour-analysis-network

  # --------------------------------------------------------------------------
  # BACKEND (monolith — replaces 6 separate agent containers)
  # --------------------------------------------------------------------------

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: behaviour-analysis-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      # ── Database ────────────────────────────────────────────────────────────
      - DATABASE_URL=postgresql://nexus:${POSTGRES_PASSWORD:-nexus_dev_2026}@postgres:5432/nexus
      - REDIS_URL=redis://redis:6379/1
      # ── Neo4j ───────────────────────────────────────────────────────────────
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-nexus_graph_2026}
      # ── Auth ────────────────────────────────────────────────────────────────
      - JWT_SECRET=${JWT_SECRET:-nexus-dev-jwt-secret-2026}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-30}
      # ── LLM providers ───────────────────────────────────────────────────────
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-}
      - OLLAMA_URL=${OLLAMA_URL:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      # ── Voice / transcription ────────────────────────────────────────────────
      - TRANSCRIPTION_BACKEND=${TRANSCRIPTION_BACKEND:-auto}
      - EXTERNAL_WHISPER_URL=${EXTERNAL_WHISPER_URL}
      - EXTERNAL_WHISPER_MODEL=${EXTERNAL_WHISPER_MODEL:-large-v3}
      - EXTERNAL_API_KEY=${EXTERNAL_API_KEY}
      - EXTERNAL_DIARIZE_URL=${EXTERNAL_DIARIZE_URL}
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - PARAKEET_URL=${PARAKEET_URL}
      - USE_PYANNOTE=${USE_PYANNOTE:-false}
      - HF_TOKEN=${HF_TOKEN}
      - DIARIZATION_MODE=${DIARIZATION_MODE:-auto}
      - DIARIZE_CLUSTERING_THRESHOLD=${DIARIZE_CLUSTERING_THRESHOLD:-0.5}
      - CLUSTERING_METHOD=${CLUSTERING_METHOD:-spectral}
      # ── Video / MediaPipe ────────────────────────────────────────────────────
      - MEDIAPIPE_MODEL_DIR=/app/models/mediapipe
      - OVERLAY_DIR=/app/data/overlays
      - SESSION_FACE_LOCK_MIN_SCORE=${SESSION_FACE_LOCK_MIN_SCORE:-0.10}
      # ── File storage ─────────────────────────────────────────────────────────
      - UPLOAD_DIR=/app/data/recordings
      - CHUNK_UPLOAD_DIR=/app/data/chunks
      - RECORDING_RETENTION_DAYS=${RECORDING_RETENTION_DAYS:-3}
      # ── Email ────────────────────────────────────────────────────────────────
      - ZEPTOMAIL_TOKEN=${ZEPTOMAIL_TOKEN:-}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@yourdomain.com}
      - FROM_NAME=${FROM_NAME:-NEXUS}
      - APP_URL=${APP_URL:-http://localhost:3006}
      # ── CORS ─────────────────────────────────────────────────────────────────
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3006,http://localhost:5173}
    volumes:
      - ./backend:/app
      - ba_video_overlays:/app/data/overlays
      - ba_upload_chunks:/app/data/chunks
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - behaviour-analysis-network

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: behaviour-analysis-dashboard
    restart: unless-stopped
    ports:
      - "3006:3000"
    environment:
      - API_GATEWAY_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - behaviour-analysis-network

# --------------------------------------------------------------------------
# VOLUMES & NETWORKS
# --------------------------------------------------------------------------

volumes:
  ba_postgres_data:
    driver: local
  ba_redis_data:
    driver: local
  ba_neo4j_data:
    driver: local
  ba_neo4j_logs:
    driver: local
  ba_video_overlays:
    driver: local
  ba_upload_chunks:
    driver: local

networks:
  behaviour-analysis-network:
    driver: bridge
    name: behaviour-analysis-network
