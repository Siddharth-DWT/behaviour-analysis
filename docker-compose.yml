# ============================================================================
# NEXUS - Multi-Agent Behavioural Analysis System
# Docker Compose - Local Development Environment
# ============================================================================
# 
# USAGE:
#   docker compose up -d          → Start all services
#   docker compose logs -f        → Watch logs
#   docker compose down           → Stop all
#   docker compose down -v        → Stop + delete data
#
# SERVICES:
#   postgres   → PostgreSQL 16 + pgvector (config, transcripts, signals, vectors)
#   redis      → Valkey 8 (inter-agent message bus)
#   voice      → Voice Agent (Python FastAPI)
#   language   → Language Agent (Python FastAPI)
#   fusion     → Fusion Agent (Python FastAPI)
#   api        → API Gateway (Python FastAPI) - dashboard backend
#   dashboard  → React Admin Dashboard (dev server)
#
# PORTS:
#   5432  → PostgreSQL
#   6379  → Redis/Valkey
#   8001  → Voice Agent API
#   8002  → Language Agent API
#   8003  → Fusion Agent API
#   8000  → API Gateway
#   5173  → Dashboard (React dev server)
#
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # INFRASTRUCTURE
  # --------------------------------------------------------------------------

  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_dev_2026}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nexus-network

  redis:
    image: valkey/valkey:8-alpine
    container_name: nexus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/valkey.conf:/etc/valkey/valkey.conf
    command: valkey-server /etc/valkey/valkey.conf
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nexus-network

